<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TapRise</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06070a;--s1:#0b0d13;--s2:#0f1219;--card:#13161f;--border:#1c2133;
  --gold:#e8b84b;--gold2:#f5d070;
  --ruby:#e84b6b;--emerald:#4be8a0;--sapphire:#4b9de8;--amethyst:#a04be8;--amber:#f5a623;
  --text:#d8dce8;--muted:#3d4560;--lock:#22273a;
  --font-h:'Cinzel',serif;--font-b:'Crimson Pro',serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);font-size:15px;max-width:440px;margin:0 auto;min-height:100vh;overflow-x:hidden;user-select:none}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 70% 40% at 50% 0%,rgba(232,184,75,.06),transparent 65%),
             radial-gradient(ellipse 40% 30% at 15% 100%,rgba(160,75,232,.04),transparent 55%)}
.app{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 7px;border-bottom:1px solid var(--border);background:rgba(11,13,19,.93);backdrop-filter:blur(8px);position:sticky;top:0;z-index:50}
.logo{font-family:var(--font-h);font-size:1.15rem;letter-spacing:.12em;color:var(--gold);text-shadow:0 0 14px rgba(232,184,75,.35);cursor:pointer}
.hdr-right{display:flex;align-items:center;gap:7px}
.hdr-pill{display:flex;align-items:center;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:3px 9px}
.hdr-pill .ico{font-size:12px}
.hdr-pill .val{font-family:var(--font-h);font-size:.8rem;color:var(--gold)}
.hdr-pill.gem .val{color:var(--emerald)}
.ad-badge{font-size:8px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;border:1px solid var(--border);border-radius:10px;padding:2px 6px}
.ad-free-badge{color:var(--emerald);border-color:rgba(75,232,160,.3);background:rgba(75,232,160,.06)}

/* ── RESOURCE BAR ── */
.res-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
.res{background:var(--s1);padding:6px 8px;text-align:center}
.res .v{font-family:var(--font-h);font-size:.9rem;color:var(--gold);line-height:1}
.res .l{font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:2px}

/* ── CLICK ZONE ── */
.click-zone{display:flex;flex-direction:column;align-items:center;padding:12px 16px 8px;background:var(--s1);transition:padding .35s}
.click-zone.expanded #clk{width:200px;height:200px;font-size:4.4rem;transition:all .35s}
#clk{transition:all .35s}
.lv-row{display:flex;justify-content:space-between;width:100%;margin-bottom:4px}
.lv-name{font-family:var(--font-h);font-size:.7rem;color:var(--gold);letter-spacing:.07em}
.lv-xp{font-size:11px;color:var(--muted)}
.prog-track{width:100%;height:4px;background:var(--border);border-radius:10px;margin-bottom:12px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#c8860a,var(--gold2));border-radius:10px;transition:width .3s;box-shadow:0 0 5px var(--gold)}
.btn-wrap{position:relative;margin-bottom:6px}
.orbit{position:absolute;inset:-12px;border-radius:50%;border:1px solid rgba(232,184,75,.07);animation:spin 12s linear infinite;pointer-events:none}
.orbit::after{content:'✦';position:absolute;top:-5px;left:50%;transform:translateX(-50%);font-size:8px;color:rgba(232,184,75,.28)}
.orbit2{animation:spin 20s linear infinite reverse;inset:-20px}
.orbit2::after{content:'◆';top:auto;bottom:-5px;font-size:7px}
@keyframes spin{to{transform:rotate(360deg)}}
#clk{width:154px;height:154px;border-radius:50%;cursor:pointer;
  background:radial-gradient(circle at 33% 30%,#2a1e06,#1a1204 50%,#080605);
  border:2px solid rgba(232,184,75,.5);
  box-shadow:0 0 0 3px rgba(232,184,75,.03),0 0 24px rgba(232,184,75,.1),inset 0 -8px 16px rgba(0,0,0,.7),inset 0 3px 9px rgba(232,184,75,.05);
  display:flex;align-items:center;justify-content:center;font-size:3.4rem;
  transition:transform .08s,box-shadow .08s;position:relative;z-index:10;touch-action:manipulation}
#clk.pressed{transform:scale(.9);box-shadow:0 0 0 3px rgba(232,184,75,.07),0 0 40px rgba(232,184,75,.22),inset 0 -4px 9px rgba(0,0,0,.7),inset 0 5px 16px rgba(232,184,75,.1)}
.cps-lbl{font-size:11px;color:var(--muted);letter-spacing:.04em}

/* ── FRENZY BAR ── */
.frenzy-wrap{width:100%;margin-top:8px;padding:0 2px}
.frenzy-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.frenzy-name{font-family:var(--font-h);font-size:.6rem;letter-spacing:.08em;color:var(--amber)}
.frenzy-name.active-name{color:var(--gold2);text-shadow:0 0 8px var(--gold)}
.frenzy-name.cooldown-name{color:var(--muted)}
.frenzy-status{font-size:10px;color:var(--muted)}
.frenzy-track{width:100%;height:7px;background:var(--border);border-radius:10px;overflow:hidden;cursor:pointer}
.frenzy-fill{height:100%;border-radius:10px;transition:width .15s}
.frenzy-fill.charging{background:linear-gradient(90deg,var(--ruby),var(--amber));box-shadow:0 0 4px rgba(245,166,35,.3)}
.frenzy-fill.ready{background:linear-gradient(90deg,var(--amber),var(--gold2));animation:frenzy-pulse .6s ease-in-out infinite alternate;cursor:pointer}
.frenzy-fill.active{background:linear-gradient(90deg,var(--gold),var(--gold2));animation:frenzy-active .4s ease-in-out infinite alternate}
.frenzy-fill.cooldown{background:var(--border);filter:none}
@keyframes frenzy-pulse{from{box-shadow:0 0 4px var(--amber)}to{box-shadow:0 0 14px var(--gold2),inset 0 0 6px rgba(255,255,255,.1)}}
@keyframes frenzy-active{from{opacity:.85}to{opacity:1;box-shadow:0 0 10px var(--gold)}}
.frenzy-ad-btn{margin-top:5px;width:100%;padding:4px 8px;background:rgba(75,157,232,.07);border:1px solid rgba(75,157,232,.25);border-radius:6px;font-family:var(--font-h);font-size:.54rem;letter-spacing:.06em;color:var(--sapphire);cursor:pointer;transition:all .2s}
.frenzy-ad-btn:hover{background:rgba(75,157,232,.14)}
.floater{position:fixed;font-family:var(--font-h);font-size:.95rem;pointer-events:none;animation:fly .9s ease forwards;z-index:999;text-shadow:0 0 6px currentColor}
@keyframes fly{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(.48)}}

/* ── TABS ── */
.tabs{display:flex;border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--s1);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:0;padding:9px 3px 8px;text-align:center;font-size:6.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-family:var(--font-h);white-space:nowrap;position:relative}
.tab.on{color:var(--gold);border-bottom-color:var(--gold);background:linear-gradient(180deg,rgba(232,184,75,.06),transparent)}
.tab.on::before{content:'';position:absolute;bottom:-1px;left:25%;right:25%;height:2px;background:var(--gold);box-shadow:0 0 6px var(--gold);border-radius:2px}
.tab.locked-tab{color:var(--muted);opacity:.38;cursor:default}
.tab .ti{font-size:14px;display:block;margin-bottom:2px}

/* ── PANELS ── */
.panel{flex:1;padding:11px;display:none;overflow-y:auto;max-height:calc(100vh - 288px);scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.panel.on{display:block}
/* Collapsed bottom pane */
.bottom-pane{transition:max-height .38s cubic-bezier(.4,0,.2,1),opacity .3s;overflow:hidden}
.bottom-pane.collapsed{opacity:0;pointer-events:none}
.collapse-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:5px;background:var(--s1);border:none;border-top:1px solid var(--border);cursor:pointer;font-family:var(--font-h);font-size:.6rem;letter-spacing:.08em;color:var(--muted);transition:color .2s}
.collapse-btn:hover{color:var(--gold)}
.collapse-btn .cb-ico{font-size:12px;transition:transform .35s}
.collapse-btn.collapsed .cb-ico{transform:rotate(180deg)}
/* Upgrade nudge bubble */
.upg-nudge{position:fixed;bottom:48px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,rgba(232,184,75,.18),rgba(232,184,75,.09));border:1px solid rgba(232,184,75,.55);border-radius:22px;padding:8px 18px;font-family:var(--font-h);font-size:.67rem;letter-spacing:.06em;color:var(--gold);box-shadow:0 0 20px rgba(232,184,75,.22),0 4px 16px rgba(0,0,0,.4);z-index:80;white-space:nowrap;display:none;cursor:pointer}
.upg-nudge.show{display:flex;align-items:center;gap:7px;animation:nudgePop .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes nudgePop{from{transform:translateX(-50%) scale(.7);opacity:0}to{transform:translateX(-50%) scale(1);opacity:1}}
.sec{font-family:var(--font-h);font-size:.57rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;padding-bottom:4px;border-bottom:1px solid var(--border)}

/* ── LOCKED PANEL ── */
.locked-panel{text-align:center;padding:32px 20px}
.lock-ico{font-size:3rem;margin-bottom:14px;display:block;opacity:.5}
.lock-title{font-family:var(--font-h);font-size:1rem;letter-spacing:.1em;color:var(--muted);margin-bottom:8px}
.lock-desc{font-size:13px;color:var(--muted);line-height:1.6;max-width:240px;margin:0 auto}
.lock-req{display:inline-flex;align-items:center;gap:6px;margin-top:14px;background:rgba(184,127,255,.07);border:1px solid rgba(184,127,255,.2);border-radius:20px;padding:5px 14px;font-family:var(--font-h);font-size:.65rem;letter-spacing:.08em;color:#b87fff}

/* ── FORGE UPGRADES ── */
.upg-list{display:flex;flex-direction:column;gap:5px}
.forge-drop-banner{background:rgba(232,184,75,.08);border:1px solid rgba(232,184,75,.3);border-radius:8px;padding:8px 12px;margin-bottom:9px;font-size:12px;color:var(--gold);text-align:center;font-family:var(--font-h);letter-spacing:.04em}
.upg{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 11px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.upg.can{border-color:rgba(232,184,75,.35)}
.upg.locked-upg{opacity:.32;cursor:default;filter:grayscale(.6)}
.upg-ico{font-size:1.45rem;flex-shrink:0}
.upg-body{flex:1;min-width:0}
.upg-name{font-family:var(--font-h);font-size:.65rem;letter-spacing:.04em;margin-bottom:2px}
.upg-desc{font-size:11px;color:var(--muted)}
.upg-unlock{font-size:10px;color:var(--sapphire);margin-top:2px}
.upg-cost{text-align:right;flex-shrink:0}
.upg-cv{font-family:var(--font-h);font-size:.75rem;color:var(--gold)}
.upg-cl{font-size:9px;color:var(--muted)}
.upg-lv{position:absolute;top:3px;right:3px;font-size:8px;background:rgba(232,184,75,.1);color:var(--gold);border-radius:3px;padding:1px 4px;font-family:var(--font-h)}

/* ── COMBAT ── */
.combat-arena{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px;margin-bottom:8px;position:relative}
.wave-badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-h);font-size:.57rem;letter-spacing:.1em;color:var(--ruby);background:rgba(232,75,107,.09);border:1px solid rgba(232,75,107,.22);border-radius:20px;padding:2px 9px;margin-bottom:9px}
.fighters{display:grid;grid-template-columns:1fr auto 1fr;gap:7px;align-items:center;margin-bottom:9px}
.fighter{text-align:center}
.fighter-ico{font-size:1.8rem;display:block;margin-bottom:2px}
.fighter-name{font-family:var(--font-h);font-size:.56rem;letter-spacing:.04em;margin-bottom:3px;display:block}
.hp-bar{height:5px;background:var(--border);border-radius:10px;overflow:hidden;margin-bottom:2px}
.hp-fill{height:100%;border-radius:10px;transition:width .4s}
.hero-hp{background:linear-gradient(90deg,#1a9e50,var(--emerald))}
.enemy-hp{background:linear-gradient(90deg,#9e1a1a,var(--ruby))}
.hp-txt{font-size:9px;color:var(--muted)}
.vs-ico{font-size:.8rem;color:var(--ruby);font-family:var(--font-h);text-align:center}
.combat-log{background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:6px 8px;max-height:70px;overflow-y:auto;font-size:10.5px;color:var(--muted);line-height:1.75;scrollbar-width:thin}
.lg{color:var(--gold)}.lr{color:var(--ruby)}.le{color:var(--emerald)}.lb{color:var(--sapphire)}.lp{color:var(--amethyst)}.la{color:var(--amber)}
.hero-stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-top:7px}
.hstat{background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:4px 3px;text-align:center}
.hstat .sv{font-family:var(--font-h);font-size:.75rem;line-height:1}
.hstat .sl{font-size:7px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-top:2px}
.drop-chances{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.drop-chip{font-size:9px;border:1px solid;border-radius:4px;padding:2px 6px}
.hu-list{display:flex;flex-direction:column;gap:5px;margin-top:7px}
.hu{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 10px;cursor:pointer;transition:all .15s}
.hu:hover:not(.cant){border-color:rgba(232,75,107,.28);background:#151020}
.hu.passive-skill{border-left:2px solid rgba(75,157,232,.4)}
.hu.passive-skill:hover:not(.cant){border-color:rgba(75,157,232,.45);background:#101520}
.hu.cant{opacity:.34;cursor:default}
.hu-ico{font-size:1.25rem;flex-shrink:0}
.hu-body{flex:1}
.hu-name{font-family:var(--font-h);font-size:.63rem;letter-spacing:.04em;margin-bottom:2px}
.hu-desc{font-size:10.5px;color:var(--muted)}
.hu-cost{font-family:var(--font-h);font-size:.7rem;color:var(--ruby);flex-shrink:0;text-align:right;min-width:42px}
.hu.passive-skill .hu-cost{color:var(--sapphire)}

/* ── EXPEDITIONS ── */
.exp-list{display:flex;flex-direction:column;gap:7px}
.exp{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 12px}
.exp.exp-locked{opacity:.38}
.exp-top{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.exp-ico{font-size:1.55rem;flex-shrink:0}
.exp-info{flex:1}
.exp-name{font-family:var(--font-h);font-size:.67rem;letter-spacing:.04em;margin-bottom:2px}
.exp-desc{font-size:11px;color:var(--muted);line-height:1.4}
.exp-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.exp-tag{font-size:9px;border:1px solid;border-radius:4px;padding:2px 6px}
.exp-tag.cost{border-color:rgba(232,75,107,.3);color:var(--ruby);background:rgba(232,75,107,.06)}
.exp-tag.wave{border-color:rgba(75,157,232,.3);color:var(--sapphire);background:rgba(75,157,232,.06)}
.exp-tag.reward{border-color:rgba(232,184,75,.25);color:var(--gold);background:rgba(232,184,75,.06)}
.exp-tag.gem{border-color:rgba(75,232,160,.25);color:var(--emerald);background:rgba(75,232,160,.06)}
.exp-btn{width:100%;padding:7px;border:1px solid var(--border);border-radius:7px;font-family:var(--font-h);font-size:.59rem;letter-spacing:.07em;cursor:pointer;transition:all .2s;background:var(--s2);color:var(--text);margin-top:8px}
.exp-btn.go{border-color:rgba(75,157,232,.38);color:var(--sapphire);background:rgba(75,157,232,.05)}
.exp-btn.go:hover{background:rgba(75,157,232,.1)}
.exp-btn.active-exp{border-color:rgba(75,232,160,.32);color:var(--emerald);background:rgba(75,232,160,.04);cursor:default}
.exp-btn:disabled{opacity:.3;cursor:default}
.exp-tbar{height:3px;background:var(--border);border-radius:10px;margin-top:6px;overflow:hidden}
.exp-tfill{height:100%;background:var(--sapphire);transition:width .5s linear}

/* ── ALCHEMY ── */
.alch-intro{font-size:11.5px;color:var(--muted);line-height:1.6;margin-bottom:9px}
.cauldron{background:var(--card);border:1px solid rgba(160,75,232,.28);border-radius:12px;padding:11px;margin-bottom:9px;text-align:center}
.cauldron-ico{font-size:2.5rem;display:block;margin-bottom:7px;animation:bob 3s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.slots{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:9px}
.slot{border:1px dashed rgba(160,75,232,.28);border-radius:8px;padding:7px 4px;text-align:center;cursor:pointer;transition:all .2s;background:rgba(160,75,232,.04);min-height:55px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.slot:hover{border-color:rgba(160,75,232,.5)}
.slot.filled{border-style:solid;border-color:rgba(160,75,232,.48);background:rgba(160,75,232,.09)}
.slot-ico{font-size:1.3rem;margin-bottom:2px}
.slot-name{font-size:8px;color:var(--amethyst);font-family:var(--font-h);letter-spacing:.04em}
.slot-empty{font-size:10px;color:var(--muted)}
.brew-btn{width:100%;padding:7px;border:1px solid rgba(160,75,232,.38);border-radius:8px;font-family:var(--font-h);font-size:.6rem;letter-spacing:.09em;cursor:pointer;transition:all .2s;background:rgba(160,75,232,.07);color:var(--amethyst)}
.brew-btn:hover:not(:disabled){background:rgba(160,75,232,.14)}
.brew-btn:disabled{opacity:.3;cursor:default}
.inv-title{font-family:var(--font-h);font-size:.57rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.inv-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:10px}
.inv-item{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:7px 4px;text-align:center;cursor:pointer;transition:all .2s}
.inv-item:hover{border-color:rgba(160,75,232,.4)}
.inv-ico{font-size:1.2rem;display:block;margin-bottom:2px}
.inv-name{font-size:8px;font-family:var(--font-h);letter-spacing:.03em}
.inv-qty{font-size:8px;color:var(--muted);margin-top:1px}
.recipe-grid{display:flex;flex-direction:column;gap:5px}
.recipe-card{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 10px;cursor:pointer;transition:all .15s}
.recipe-card:hover{border-color:rgba(160,75,232,.35)}
.recipe-card.unknown{opacity:.42;filter:blur(.4px);cursor:default}
.pot-ico{font-size:1.25rem;flex-shrink:0}
.pot-body{flex:1}
.pot-name{font-family:var(--font-h);font-size:.63rem;letter-spacing:.04em;margin-bottom:2px}
.pot-desc{font-size:10.5px;color:var(--muted)}
.pot-ing{font-size:9px;color:var(--amethyst);margin-top:2px}
.pot-action{font-family:var(--font-h);font-size:.58rem;color:var(--amethyst);flex-shrink:0}
.potions-owned{display:flex;flex-direction:column;gap:5px;margin-top:8px}
.potion-item{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:7px 10px;cursor:pointer;transition:all .15s}
.potion-item:hover{border-color:rgba(160,75,232,.35)}

/* ── GEM SHOP ── */
.gem-balance-card{display:flex;align-items:center;gap:10px;background:rgba(75,232,160,.05);border:1px solid rgba(75,232,160,.18);border-radius:10px;padding:10px 12px;margin-bottom:11px}
.gem-balance-ico{font-size:1.8rem}
.gem-balance-val{font-family:var(--font-h);font-size:1.4rem;color:var(--emerald);line-height:1}
.gem-earn-info{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 11px;margin-bottom:11px;font-size:11.5px;color:var(--muted);line-height:1.75}
.gem-earn-info strong{color:var(--emerald)}
.relic-store-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.rstore-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center;cursor:pointer;transition:border-color .2s}
.rstore-item:hover{border-color:rgba(75,232,160,.35)}
.rstore-ico{font-size:1.8rem;display:block;margin-bottom:4px}
.rstore-name{font-family:var(--font-h);font-size:.63rem;letter-spacing:.04em;margin-bottom:2px}
.rstore-flavor{font-size:9px;color:var(--muted);margin-bottom:6px;line-height:1.35}
.rstore-price{display:inline-flex;align-items:center;gap:3px;background:rgba(75,232,160,.08);border:1px solid rgba(75,232,160,.22);border-radius:20px;padding:2px 8px;font-family:var(--font-h);font-size:.65rem;color:var(--emerald)}
.rstore-item.cant-afford .rstore-price{border-color:rgba(255,92,92,.18);background:rgba(255,92,92,.05);color:var(--ruby)}
.donate-packs{display:flex;flex-direction:column;gap:6px}
.pack{display:flex;align-items:center;gap:10px;background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:9px 11px;cursor:pointer;transition:all .2s}
.pack:hover{border-color:rgba(232,184,75,.38);background:#131620}
.pack.featured{border-color:rgba(232,184,75,.38);background:rgba(232,184,75,.04)}
.pack-ico{font-size:1.4rem;flex-shrink:0}
.pack-info{flex:1}
.pack-name{font-family:var(--font-h);font-size:.68rem;letter-spacing:.04em;margin-bottom:2px}
.pack-desc{font-size:10.5px;color:var(--muted)}
.pack-bonus{font-size:9.5px;color:var(--emerald);margin-top:2px}
.pack-price{font-family:var(--font-h);font-size:.8rem;color:var(--gold);flex-shrink:0}
.pack-badge{display:inline-block;background:var(--ruby);color:#fff;font-size:7px;font-family:var(--font-h);letter-spacing:.07em;border-radius:3px;padding:1px 4px;margin-left:4px;vertical-align:middle}
.ad-remove-card{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid rgba(75,157,232,.22);border-radius:10px;padding:10px 12px;cursor:pointer;transition:all .2s;margin-bottom:8px}
.ad-remove-card:hover{border-color:rgba(75,157,232,.42)}
.ad-remove-card.owned{border-color:rgba(75,232,160,.28);cursor:default}
.ad-remove-ico{font-size:1.45rem;flex-shrink:0}
.ad-remove-info{flex:1}
.ad-remove-title{font-family:var(--font-h);font-size:.68rem;letter-spacing:.04em;color:var(--sapphire);margin-bottom:2px}
.ad-remove-card.owned .ad-remove-title{color:var(--emerald)}
.ad-remove-desc{font-size:10.5px;color:var(--muted)}
.ad-remove-price{font-family:var(--font-h);font-size:.8rem;color:var(--sapphire);flex-shrink:0}
.ad-slot{background:var(--s2);border:1px dashed var(--border);border-radius:6px;padding:7px;text-align:center;font-size:10px;color:var(--muted);letter-spacing:.07em;margin:7px 0}

/* ── DAILY ── */
.quest-list{display:flex;flex-direction:column;gap:7px}
.quest{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.quest.done-q{border-color:rgba(75,232,160,.38);background:rgba(75,232,160,.03)}
.quest-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:7px}
.quest-ico{font-size:1.4rem;flex-shrink:0}
.quest-info{flex:1}
.quest-name{font-family:var(--font-h);font-size:.66rem;letter-spacing:.04em;margin-bottom:2px}
.quest-desc{font-size:11px;color:var(--muted);line-height:1.4}
.quest-reward{font-size:9.5px;color:var(--emerald);margin-top:3px;font-family:var(--font-h)}
.qp-track{height:5px;background:var(--border);border-radius:10px;margin-bottom:4px;overflow:hidden}
.qp-fill{height:100%;background:linear-gradient(90deg,#1a7a50,var(--emerald));border-radius:10px;transition:width .4s}
.quest-status{font-size:10px;color:var(--muted);text-align:right}
.quest-claim-btn{width:100%;padding:6px;border:1px solid rgba(75,232,160,.38);border-radius:7px;font-family:var(--font-h);font-size:.58rem;letter-spacing:.07em;cursor:pointer;background:rgba(75,232,160,.07);color:var(--emerald);margin-top:6px;transition:all .2s}
.quest-claim-btn:hover{background:rgba(75,232,160,.13)}
.all-done-banner{background:linear-gradient(135deg,rgba(75,232,160,.08),rgba(75,157,232,.06));border:1px solid rgba(75,232,160,.28);border-radius:10px;padding:10px 12px;text-align:center;margin-bottom:9px}
.adb-title{font-family:var(--font-h);font-size:.7rem;letter-spacing:.06em;color:var(--emerald);margin-bottom:3px}
.adb-desc{font-size:11px;color:var(--muted)}
.claim-all-btn{margin-top:7px;padding:6px 16px;background:var(--emerald);color:#071008;border:none;border-radius:7px;font-family:var(--font-h);font-size:.62rem;letter-spacing:.07em;cursor:pointer}
.quest-timer{font-size:10px;color:var(--muted);text-align:center;margin-top:7px}

/* ── PRESTIGE ── */
.prestige-wrap{text-align:center;padding:6px 0}
.pr-orb{width:88px;height:88px;border-radius:50%;background:radial-gradient(circle at 33% 33%,#3b1a6e,#1a0b33);border:2px solid rgba(192,132,252,.55);box-shadow:0 0 28px rgba(184,127,255,.18);margin:10px auto;display:flex;align-items:center;justify-content:center;font-size:2.2rem}
.pr-title{font-family:var(--font-h);font-size:1.35rem;color:#b87fff;letter-spacing:.1em;margin-bottom:5px}
.pr-desc{font-size:11.5px;color:var(--muted);line-height:1.6;max-width:250px;margin:0 auto 11px}
.pr-box{background:rgba(184,127,255,.07);border:1px solid rgba(184,127,255,.18);border-radius:10px;padding:9px;margin-bottom:11px}
.pr-box p{font-size:11.5px;color:#b87fff;font-weight:600;line-height:1.7}
.pr-unlocks{background:rgba(75,157,232,.06);border:1px solid rgba(75,157,232,.18);border-radius:8px;padding:8px 11px;margin-bottom:11px;font-size:11px;color:var(--sapphire);line-height:1.75}
.pr-btn{background:linear-gradient(135deg,#6d28d9,#b87fff);border:none;border-radius:10px;color:#fff;font-family:var(--font-h);font-size:.9rem;letter-spacing:.1em;padding:10px 24px;cursor:pointer;width:100%;box-shadow:0 0 12px rgba(109,40,217,.22)}
.pr-btn:hover{opacity:.9}
.pr-btn:disabled{opacity:.22;cursor:default}
.pr-req{font-size:11px;color:var(--muted);margin-top:7px}

/* ── TROPHIES ── */
.ach-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.ach{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px;text-align:center}
.ach.unlocked{border-color:rgba(75,232,160,.38);background:rgba(75,232,160,.03)}
.ach-ico{font-size:1.4rem;margin-bottom:3px;filter:grayscale(1)}
.ach.unlocked .ach-ico{filter:none}
.ach-nm{font-family:var(--font-h);font-size:.58rem;letter-spacing:.04em;margin-bottom:2px}
.ach.unlocked .ach-nm{color:var(--emerald)}
.ach-ds{font-size:9px;color:var(--muted);line-height:1.4}

/* ── BUY QUANTITY SELECTOR ── */
.buy-qty-row{display:flex;gap:4px;margin-bottom:8px;align-items:center}
.buy-qty-lbl{font-size:9px;color:var(--muted);font-family:var(--font-h);letter-spacing:.07em;margin-right:2px}
.qty-btn{flex:1;padding:4px 2px;border:1px solid var(--border);border-radius:6px;background:var(--s2);font-family:var(--font-h);font-size:.58rem;color:var(--muted);cursor:pointer;transition:all .15s;text-align:center}
.qty-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(232,184,75,.08)}
.qty-btn:hover:not(.active){border-color:rgba(232,184,75,.3);color:var(--text)}

/* ── SOUL SHARDS ── */
.shard-display{display:flex;align-items:center;gap:6px;background:rgba(232,75,107,.07);border:1px solid rgba(232,75,107,.22);border-radius:8px;padding:6px 10px;margin-bottom:8px}
.shard-ico{font-size:1.1rem}
.shard-val{font-family:var(--font-h);font-size:.9rem;color:var(--ruby)}
.shard-lbl{font-size:10px;color:var(--muted)}

/* ── DEV MODE ── */
.dev-panel{background:var(--card);border:1px solid rgba(75,232,160,.3);border-radius:10px;padding:13px;margin-bottom:9px}
.dev-title{font-family:var(--font-h);font-size:.78rem;letter-spacing:.08em;color:var(--emerald);margin-bottom:11px;display:flex;align-items:center;gap:7px}
.dev-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:9px}
.dev-btn{background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:8px;font-family:var(--font-h);font-size:.6rem;letter-spacing:.06em;color:var(--emerald);cursor:pointer;transition:all .2s;text-align:center}
.dev-btn:hover{border-color:var(--emerald);background:rgba(75,232,160,.08)}
.dev-btn.ruby{color:var(--ruby);border-color:transparent}
.dev-btn.ruby:hover{border-color:var(--ruby);background:rgba(232,75,107,.08)}
.dev-btn.gold{color:var(--gold);border-color:transparent}
.dev-btn.gold:hover{border-color:var(--gold);background:rgba(232,184,75,.08)}
.dev-btn.sapphire{color:var(--sapphire);border-color:transparent}
.dev-btn.sapphire:hover{border-color:var(--sapphire);background:rgba(75,157,232,.08)}
.dev-btn.amethyst{color:var(--amethyst);border-color:transparent}
.dev-btn.amethyst:hover{border-color:var(--amethyst);background:rgba(160,75,232,.08)}
.dev-input-row{display:flex;gap:6px;align-items:center;margin-top:6px}
.dev-input{background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:6px 9px;font-family:var(--font-b);font-size:12px;color:var(--text);flex:1;outline:none}
.dev-input:focus{border-color:var(--emerald)}

/* ── TUTORIAL ── */
.tut-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;display:flex;align-items:flex-end;justify-content:center;padding:0 0 20px;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.tut-box{background:var(--card);border:1px solid rgba(232,184,75,.35);border-radius:18px 18px 18px 18px;padding:20px 18px 16px;max-width:380px;width:90%;box-shadow:0 0 40px rgba(232,184,75,.12);position:relative}
.tut-steps{display:flex;gap:4px;justify-content:center;margin-bottom:14px}
.tut-dot{width:6px;height:6px;border-radius:50%;background:var(--border);transition:background .2s}
.tut-dot.active{background:var(--gold)}
.tut-ico{font-size:2.8rem;display:block;text-align:center;margin-bottom:10px}
.tut-title{font-family:var(--font-h);font-size:.9rem;letter-spacing:.08em;color:var(--gold);text-align:center;margin-bottom:8px}
.tut-body{font-size:12.5px;color:var(--text);line-height:1.7;text-align:center;margin-bottom:16px}
.tut-highlight{color:var(--gold);font-weight:600}
.tut-btn{width:100%;padding:9px;border:1px solid rgba(232,184,75,.4);border-radius:10px;background:linear-gradient(135deg,rgba(232,184,75,.1),rgba(232,184,75,.04));font-family:var(--font-h);font-size:.72rem;letter-spacing:.1em;color:var(--gold);cursor:pointer;transition:all .2s}
.tut-btn:hover{background:rgba(232,184,75,.15)}
.tut-skip{display:block;text-align:center;font-size:10px;color:var(--muted);margin-top:8px;cursor:pointer;letter-spacing:.06em}
.tut-skip:hover{color:var(--text)}
.tut-highlight-elem{position:relative;z-index:201;pointer-events:none}

.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--emerald);color:#071008;font-weight:700;font-size:11.5px;padding:7px 14px;border-radius:22px;z-index:9999;transition:transform .3s;white-space:nowrap;pointer-events:none;font-family:var(--font-h);letter-spacing:.04em}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.bad{background:var(--ruby);color:#fff}
.toast.info{background:var(--sapphire);color:#001520}
.toast.prestige{background:#b87fff;color:#1a0b33}
.toast.gem{background:var(--emerald);color:#071008}
.toast.donate{background:var(--gold);color:#1a1000}
.toast.recipe{background:var(--amethyst);color:#fff}
.toast.drop{background:var(--amber);color:#1a0e00}
.toast.dev{background:#0f2b0f;color:var(--emerald);border:1px solid var(--emerald)}
</style>
</head>
<body>
<div class="app">

<div class="hdr">
  <div class="logo" id="logo-tap">TapRise</div>
  <div class="hdr-right">
    <div class="hdr-pill"><span class="ico">🪙</span><span class="val" id="h-coins">0</span></div>
    <div class="hdr-pill gem"><span class="ico">💎</span><span class="val" id="h-gems">0</span></div>
    <div class="ad-badge" id="ad-badge">ADS</div>
  </div>
</div>

<div class="res-bar">
  <div class="res"><div class="v" id="s-cpc">1</div><div class="l">Per Click</div></div>

</div>

    <div class="orbit"></div><div class="orbit orbit2"></div>
    <div id="clk">🪙</div>
  </div>
  <div class="cps-lbl" id="cps-lbl">+0 coins/sec</div>
  <div class="frenzy-wrap" id="frenzy-wrap">
    <div class="frenzy-row">
      <span class="frenzy-name" id="frenzy-name">⚡ FRENZY</span>
      <span class="frenzy-status" id="frenzy-status">0 / 50</span>
    </div>
    <div class="frenzy-track" id="frenzy-track">
      <div class="frenzy-fill charging" id="frenzy-fill" style="width:0%"></div>

</div>

<button class="collapse-btn" id="collapse-btn">

<div class="bottom-pane" id="bottom-pane">
<div class="tabs" id="tab-bar">
  <div class="tab on"  id="tab-upgrades"><span class="ti">⚒️</span>Forge</div>
  <div class="tab"     id="tab-combat"><span class="ti">⚔️</span>Combat</div>
  <div class="tab"     id="tab-expeditions"><span class="ti">🗺️</span>Quests</div>
  <div class="tab"     id="tab-alchemy"><span class="ti">⚗️</span>Alchemy</div>

    <div class="pr-title">Ascension</div>
    <div class="pr-orb">✨</div>
    <p class="pr-desc">Transcend your current run. Upgrades reset — but your legacy grows stronger.</p>
    <div class="pr-box"><p id="pr-bonus-text">—</p></div>
    <div class="pr-unlocks" id="pr-unlocks">—</div>
    <button class="pr-btn" id="pr-btn" disabled>ASCEND</button>
    <p class="pr-req" id="pr-req">—</p>

<script>
/* ═══════════════════════════════════════
   CONSTANTS
   ═══════════════════════════════════════ */

/*
  Forge unlock chain:
  Each upgrade has an `unlockReq` = {idx, level} meaning "previous upgrade idx must be at level X"
  No max level. Cost = base * (scale ^ level)
*/
const UPGRADES = [
  // idx 0 — always available
  // milestone: every 10 levels → ×1.5 bonus stacks
  { name:'Lucky Finger',    ico:'☝️', desc:'+1 coin/click (+50% per 10 lvls)',   base:10,   scale:2.1,  unlockReq:null,      e:l=>{const m=Math.pow(1.5,Math.floor(l/10));return{cpc:Math.floor(l*m),cps:0,mult:1}} },
  // idx 1 — unlocks when 0 >= 3
  { name:'Coin Magnet',     ico:'🧲', desc:'+3 coin/click (+50% per 10 lvls)',   base:60,   scale:2.2,  unlockReq:{idx:0,lv:3}, e:l=>{const m=Math.pow(1.5,Math.floor(l/10));return{cpc:Math.floor(l*3*m),cps:0,mult:1}} },
  // idx 2 — unlocks when 1 >= 3
  { name:'Gold Vein',       ico:'⛏️', desc:'+2 coins/sec (+50% per 10 lvls)',    base:130,  scale:2.25, unlockReq:{idx:1,lv:3}, e:l=>{const m=Math.pow(1.5,Math.floor(l/10));return{cpc:0,cps:Math.floor(l*2*m),mult:1}} },
  // idx 3 — unlocks when 2 >= 3
  { name:'Tap Frenzy',      ico:'⚡', desc:'+10 coin/click (+50% per 10 lvls)',  base:400,  scale:2.3,  unlockReq:{idx:2,lv:3}, e:l=>{const m=Math.pow(1.5,Math.floor(l/10));return{cpc:Math.floor(l*10*m),cps:0,mult:1}} },
  // idx 4 — unlocks when 3 >= 3
  { name:'Coin Factory',    ico:'🏭', desc:'+8 coins/sec (+50% per 10 lvls)',    base:900,  scale:2.35, unlockReq:{idx:3,lv:3}, e:l=>{const m=Math.pow(1.5,Math.floor(l/10));return{cpc:0,cps:Math.floor(l*8*m),mult:1}} },
  // idx 5 — unlocks when 4 >= 3
  { name:'Midas Touch',     ico:'👑', desc:'×1.35 all income per level',         base:3000, scale:3.0,  unlockReq:{idx:4,lv:3}, e:l=>({cpc:0,cps:0,mult:Math.pow(1.35,l)}) },
  // idx 6 — unlocks when 5 >= 2
  { name:'Time Warp',       ico:'⏳', desc:'+20 coins/sec (+50% per 10 lvls)',   base:8000, scale:2.6,  unlockReq:{idx:5,lv:2}, e:l=>{const m=Math.pow(1.5,Math.floor(l/10));return{cpc:0,cps:Math.floor(l*20*m),mult:1}} },
  // idx 7 — unlocks when 6 >= 2
  { name:'Arcane Lens',     ico:'🔮', desc:'+50 coin/click (+50% per 10 lvls)', base:18000,scale:2.7,  unlockReq:{idx:6,lv:2}, e:l=>{const m=Math.pow(1.5,Math.floor(l/10));return{cpc:Math.floor(l*50*m),cps:0,mult:1}} },
  // idx 8 — unlocks when 7 >= 2
  { name:'Cosmic Engine',   ico:'🌌', desc:'×1.65 all income per level',         base:50000,scale:3.4,  unlockReq:{idx:7,lv:2}, e:l=>({cpc:0,cps:0,mult:Math.pow(1.65,l)}) },
];

const HERO_GEAR = [
  { name:'Iron Sword',      ico:'🗡️', desc:'+5 ATK',        shardCost:15,   stat:'atk',   amt:5  },
  { name:'Leather Helm',    ico:'🪖', desc:'+10 DEF',       shardCost:25,   stat:'def',   amt:10 },
  { name:'Vitality Gem',    ico:'💠', desc:'+30 Max HP',    shardCost:40,   stat:'maxhp', amt:30 },
  { name:'Rune Blade',      ico:'⚔️', desc:'+15 ATK',       shardCost:80,   stat:'atk',   amt:15 },
  { name:'Dragon Mail',     ico:'🛡️', desc:'+25 DEF',       shardCost:150,  stat:'def',   amt:25 },
  { name:'Phoenix Core',    ico:'🔥', desc:'+10% Crit',     shardCost:250,  stat:'crit',  amt:10 },
  { name:'Titan Gauntlets', ico:'🥊', desc:'+35 ATK',       shardCost:500,  stat:'atk',   amt:35 },
  { name:'Void Armor',      ico:'🌑', desc:'+55 DEF',       shardCost:900,  stat:'def',   amt:55 },
  { name:'Elder Crown',     ico:'👑', desc:'+100 Max HP',   shardCost:1500, stat:'maxhp', amt:100},
];

const HERO_SKILLS = [
  { name:'Vampiric Strike',  ico:'🩸', desc:'Heal 3 HP on every kill',        shardCost:80,   skill:'vampiric',  val:3   },
  { name:'Lucky Looter',     ico:'🍀', desc:'+5% gem & relic drop chance',     shardCost:120,  skill:'luckDrop',  val:5   },
  { name:'Berserker',        ico:'😤', desc:'+35% ATK when HP < 50%',          shardCost:200,  skill:'berserker', val:1.35},
  { name:'Iron Will',        ico:'💪', desc:'Regen 2 HP each combat tick',     shardCost:350,  skill:'regen',     val:2   },
  { name:'Eagle Eye',        ico:'🦅', desc:'Crits deal ×3 dmg (was ×2)',      shardCost:600,  skill:'eagleEye',  val:3   },
  { name:'Fortune Finder',   ico:'💰', desc:'+30% bonus coins per kill',       shardCost:900,  skill:'goldFind',  val:1.3 },
  { name:'Gem Sense',        ico:'💎', desc:'+8% gem drop chance',             shardCost:1400, skill:'gemSense',  val:8   },
  { name:'Battle Hymn',      ico:'🎺', desc:'+10% all stats per owned skill',  shardCost:2500, skill:'battleHymn',val:0.1 },

/* ═══════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════ */
const xpFor   = lvl  => Math.floor(100 * Math.pow(1.4, lvl - 1));
const upgCost = i    => Math.floor(UPGRADES[i].base * Math.pow(UPGRADES[i].scale, G.upgrades[i]));
const clamp   = (v,lo,hi) => Math.max(lo, Math.min(hi, v));
const rand    = (a,b)=> Math.floor(Math.random()*(b-a+1))+a;
const rollPct = pct  => Math.random()*100 < pct;
const SUFFIXES = [
  [1e33, 'Dc'],   // Decillion
  [1e30, 'No'],   // Nonillion
  [1e27, 'Oc'],   // Octillion
  [1e24, 'Sp'],   // Septillion
  [1e21, 'Sx'],   // Sextillion
  [1e18, 'Qi'],   // Quintillion
  [1e15, 'Qa'],   // Quadrillion
  [1e12, 'T'],    // Trillion
  [1e9,  'B'],    // Billion
  [1e6,  'M'],    // Million
  [1e3,  'K'],    // Thousand
];
const fmt = n => {
  if(!isFinite(n)) return n > 0 ? '∞' : '-∞';
  for(const [div, sfx] of SUFFIXES) {
    if(n >= div) return (n/div).toFixed(1)+sfx;
  }
  return Math.floor(n).toString();
};
const fmtTime = s => {
  if(s<60) return s+'s';
  if(s<3600) return Math.floor(s/60)+'m '+Math.ceil(s%60)+'s';
  return Math.floor(s/3600)+'h '+Math.floor((s%3600)/60)+'m';
};

function isUpgUnlocked(i) {
  const req = UPGRADES[i].unlockReq;
  if(!req) return true;
  return G.upgrades[req.idx] >= req.lv;
}

/* ═══════════════════════════════════════
   COIN/GEM/XP EARN
   ═══════════════════════════════════════ */
function getStats() {
  let cpc=1, cps=0, mult=1;
  UPGRADES.forEach((u,i)=>{
    if(!G.upgrades[i]) return;
    const e=u.e(G.upgrades[i]);
    cpc+=e.cpc; cps+=e.cps; mult*=e.mult;
  });
  const now=Date.now();
  let coinMult=1, cpsMult=1, allMult=1;
  if(G.activeEffects.coinMult &&now<G.activeEffects.coinMult.exp)  coinMult=G.activeEffects.coinMult.val;
  if(G.activeEffects.cpsMult  &&now<G.activeEffects.cpsMult.exp)   cpsMult=G.activeEffects.cpsMult.val;
  if(G.activeEffects.allMult  &&now<G.activeEffects.allMult.exp)   allMult=G.activeEffects.allMult.val;
  if(G.activeEffects.stormCoin&&now<G.activeEffects.stormCoin.exp) coinMult*=G.activeEffects.stormCoin.val;
  // Frenzy boost
  const frenzyMult = (G.frenzy.active && G.frenzy.activeEndsAt && now < G.frenzy.activeEndsAt) ? 3 : 1;
  // Prestige coin-per-click flat bonus (5 coins per prestige level)
  const prestigeClickBonus = G.prestigeCount * 5;
  return {
    cpc: (isFinite(cpc) ? Math.floor((cpc + prestigeClickBonus)*mult*G.prestigeMult*coinMult*allMult*frenzyMult) : Infinity),
    cps: (isFinite(cps) ? Math.floor(cps*mult*G.prestigeMult*cpsMult*allMult) : Infinity),
  };
}

function heroStats() {
  const now=Date.now();
  let atk=G.hero.atk, def=G.hero.def, crit=G.hero.crit;
  if(G.heroPassive.berserker && G.hero.hp < G.hero.maxhp*0.5) atk=Math.floor(atk*1.35);
  if(G.activeEffects.heroAtk  && now<G.activeEffects.heroAtk.exp)   atk=Math.floor(atk*G.activeEffects.heroAtk.val);
  if(G.activeEffects.dragonBuff&&now<G.activeEffects.dragonBuff.exp){atk*=2; def*=2;}
  const critMult = G.heroPassive.eagleEye ? 3 : 2;
  return {atk, def, crit, critMult};
}

function gemDropChance()   { return clamp(1 + G.level*0.1 + G.heroPassive.luckDrop + G.heroPassive.gemSense, 0, 15); }
function relicDropChance() { return clamp(3 + G.level*0.2 + G.heroPassive.luckDrop, 0, 22); }

   ═══════════════════════════════════════ */
let toastT;
function showToast(msg, type) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show'+(type?' '+type:'');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2700);
}
function spawnFloater(x, y, txt, col) {
  const el=document.createElement('div');
  el.className='floater'; el.textContent=txt;
  el.style.color=col||'var(--gold)';
  el.style.left=(x+rand(-16,16))+'px'; el.style.top=(y-12)+'px';
  document.body.appendChild(el); setTimeout(()=>el.remove(),920);
}

/* ═══════════════════════════════════════
   XP & LEVEL
   ═══════════════════════════════════════ */
function gainXP(amt) {
  const now=Date.now();
  if(G.activeEffects.xpMult && now<G.activeEffects.xpMult.exp) amt=Math.floor(amt*G.activeEffects.xpMult.val);
  G.xp += amt;
  while(G.xp >= xpFor(G.level)) {
    G.xp -= xpFor(G.level);
    G.level++;
    showToast('🎉 Level '+G.level+'!');
    checkPrestigeReady();
  }
}

/* ═══════════════════════════════════════
   FRENZY
   ═══════════════════════════════════════ */
function activateFrenzy() {
  if(G.frenzy.active || (G.frenzy.cooldownEndsAt && Date.now() < G.frenzy.cooldownEndsAt)) return;
  if(G.frenzy.charge < G.frenzy.maxCharge) return;
  G.frenzy.active = true;
  G.frenzy.charge = 0;
  G.frenzy.activeEndsAt = Date.now() + 60000; // 60s
  showToast('⚡ FRENZY! ×3 CPC for 60s!','drop');
  renderFrenzy();
}

function renderFrenzy() {
  const f = G.frenzy;
  const now = Date.now();
  const nameEl   = document.getElementById('frenzy-name');
  const statusEl = document.getElementById('frenzy-status');
  const fillEl   = document.getElementById('frenzy-fill');
  const trackEl  = document.getElementById('frenzy-track');
  const wrapEl   = document.getElementById('frenzy-wrap');
  if(!nameEl) return;

  // Check if frenzy ended
  if(f.active && f.activeEndsAt && now >= f.activeEndsAt) {
    f.active = false;
    f.cooldownEndsAt = now + 600000; // 10min cooldown
    f.charge = 0;
    showToast('⚡ Frenzy ended! 10min cooldown.','bad');
  }

  // Check if cooldown ended
  if(!f.active && f.cooldownEndsAt && now >= f.cooldownEndsAt) {
    f.cooldownEndsAt = null;
    f.charge = 0;
  }

  // Remove old ad button
  const oldBtn = wrapEl.querySelector('.frenzy-ad-btn');
  if(oldBtn) oldBtn.remove();

  if(f.active && f.activeEndsAt && now < f.activeEndsAt) {
    const rem = Math.ceil((f.activeEndsAt - now)/1000);
    const pct = clamp(1-(f.activeEndsAt-now)/60000, 0, 1)*100;
    nameEl.textContent = '⚡ FRENZY ACTIVE';
    nameEl.className = 'frenzy-name active-name';
    statusEl.textContent = rem+'s';
    fillEl.style.width = (100-pct)+'%';
    fillEl.className = 'frenzy-fill active';
    trackEl.onclick = null;
  } else if(f.cooldownEndsAt && now < f.cooldownEndsAt) {
    const rem = Math.ceil((f.cooldownEndsAt - now)/1000);
    const pct = clamp(1-(f.cooldownEndsAt-now)/600000, 0, 1)*100;
    nameEl.textContent = '⚡ FRENZY';
    nameEl.className = 'frenzy-name cooldown-name';
    statusEl.textContent = 'CD '+fmtTime(rem);
    fillEl.style.width = pct+'%';
    fillEl.className = 'frenzy-fill cooldown';
    trackEl.onclick = null;
    // Show ad skip button
    const adBtn = document.createElement('button');
    adBtn.className = 'frenzy-ad-btn';
    adBtn.textContent = '📺 Watch Ad — Skip Cooldown';
    adBtn.addEventListener('click', ()=>{
      if(!confirm('Watch an ad to skip the cooldown?')) return;
      G.frenzy.cooldownEndsAt = null; G.frenzy.charge = 0;
      showToast('⚡ Cooldown skipped!','gem');
      renderFrenzy();
    });
    wrapEl.appendChild(adBtn);
  } else if(f.charge >= f.maxCharge) {
    nameEl.textContent = '⚡ FRENZY — TAP TO ACTIVATE';
    nameEl.className = 'frenzy-name active-name';
    statusEl.textContent = 'READY!';
    fillEl.style.width = '100%';
    fillEl.className = 'frenzy-fill ready';
    trackEl.onclick = activateFrenzy;
  } else {
    const pct = (f.charge / f.maxCharge)*100;
    nameEl.textContent = '⚡ FRENZY';
    nameEl.className = 'frenzy-name';
    statusEl.textContent = f.charge+' / '+f.maxCharge;
    fillEl.style.width = pct+'%';
    fillEl.className = 'frenzy-fill charging';
    trackEl.onclick = null;
  }
}

/* ═══════════════════════════════════════
   CLICK
   ═══════════════════════════════════════ */
function handleClick(x, y) {
  const {cpc} = getStats();
  const earn = isFinite(cpc) ? cpc : Number.MAX_SAFE_INTEGER;
  G.coins+=earn; G.totalCoins+=earn; G.clicks++;
  G.questProg.clicks++; G.questProg.earn+=earn;
  // XP per click scales with prestige
  const xpPerClick = 1 + Math.floor(G.level*0.15) + G.prestigeCount*2;
  gainXP(xpPerClick);
  // Frenzy charge
  const f = G.frenzy;
  const now = Date.now();
  if(!f.active && !(f.cooldownEndsAt && now < f.cooldownEndsAt) && f.charge < f.maxCharge) {
    f.charge = Math.min(f.maxCharge, f.charge + 1);
  }
  spawnFloater(x, y, '+'+(isFinite(cpc)?fmt(cpc):'∞'));
  renderAll(); checkAchievements(); updateQuests();
}

/* ── FORGE BUY QTY HELPER ── */
function upgCostN(i, n) {
  // Sum of geometric series: base * (scale^lv + scale^(lv+1) + ... + scale^(lv+n-1))
  const u = UPGRADES[i]; const lv = G.upgrades[i];
  let total = 0;
  for(let k=0; k<n; k++) total += Math.floor(u.base * Math.pow(u.scale, lv+k));
  return total;
}
function maxAffordable(i) {
  const u = UPGRADES[i]; let lv = G.upgrades[i];
  let budget = G.coins, count = 0;
  while(true) {
    const c = Math.floor(u.base * Math.pow(u.scale, lv+count));
    if(budget < c) break;
    budget -= c; count++;
    if(count >= 10000) break; // safety
  }
  return count;
}

function buyUpg(i) {
  const req = UPGRADES[i].unlockReq;
  if(req && G.upgrades[req.idx] < req.lv) return;
  const qty = G.forgeBuyQty === -1 ? maxAffordable(i) : G.forgeBuyQty;
  if(qty <= 0) return;
  const totalCost = upgCostN(i, qty);
  if(G.coins < totalCost) {
    // try buying as many as possible if qty>1
    const can = maxAffordable(i);
    if(can <= 0) return;
    const cost2 = upgCostN(i, can);
    G.coins -= cost2; G.upgrades[i] += can;
    gainXP((8 + i*3) * can);
  } else {
    G.coins -= totalCost; G.upgrades[i] += qty;
    gainXP((8 + i*3) * qty);
  }
  renderAll(); checkAchievements();
}

/* ═══════════════════════════════════════
   COMBAT
   ═══════════════════════════════════════ */
function spawnEnemy() {
  const isBoss = G.wave % 10 === 0;
  const pool   = isBoss ? ENEMY_POOL.filter(e=>e.boss) : ENEMY_POOL.filter(e=>!e.boss);
  const maxTier = clamp(Math.floor((G.wave-1)/8), 0, 3);
  const tiered = pool.filter(e=>e.tier<=maxTier);
  const base   = (tiered.length?tiered:pool)[rand(0,(tiered.length||pool.length)-1)];
  const scale  = 1 + G.wave*0.15;
  G.enemy = {
    ...base,
    hp:    Math.floor(base.baseHP  * scale),
    atk:   Math.floor(base.baseAtk * scale),
    def:   Math.floor(base.baseDef * scale),
    reward:Math.floor(base.reward  * scale),
    isBoss,
  };
  G.enemyHP = G.enemy.hp;
}

function addLog(msg, cls) {
  G.combatLog.unshift({msg, cls});
  if(G.combatLog.length > 12) G.combatLog.pop();
}

function rollCombatDrops(enemy) {
  const drops=[];
  const now=Date.now();
  const gemMult=(G.activeEffects.gemMult&&now<G.activeEffects.gemMult.exp)?G.activeEffects.gemMult.val:1;
  // Coins (always)
  const coinBonus = Math.floor(G.wave * G.level * 0.35);
  const goldMult  = G.heroPassive.goldFind || 1;
  const totalCoin = Math.floor((enemy.reward + coinBonus) * goldMult);
  G.coins+=totalCoin; G.totalCoins+=totalCoin; G.questProg.earn+=totalCoin;
  // Soul Shards (combat currency) — always drop, bosses give more
  const shardAmt = enemy.isBoss ? rand(5,10) + Math.floor(G.wave/5) : rand(1,3) + Math.floor(G.wave/10);
  G.soulShards += shardAmt; G.totalSoulShards += shardAmt;
  drops.push({type:'shard', amt:shardAmt});
  // Gem drop
  if(rollPct(gemDropChance() * gemMult)) {
    const ga = enemy.isBoss ? 2 : 1;
    G.gems+=ga; G.totalGems+=ga;
    drops.push({type:'gem', amt:ga});
  }
  // Relic drop
  if(rollPct(relicDropChance())) {
    const tierMax = clamp(Math.floor(G.wave/5), 0, RELIC_DEFS.length-1);
    const relic   = RELIC_DEFS[rand(0, tierMax)];
    G.relicInventory[relic.id]=(G.relicInventory[relic.id]||0)+1;
    drops.push({type:'relic', relic});
  }
  // Wave milestone bonus
  if(G.wave%5===0 && !enemy.isBoss) {
    const bonus=G.wave*G.level*7;
    G.coins+=bonus; G.totalCoins+=bonus;
    drops.push({type:'milestone', amt:bonus});
  }
  return drops;
}

function tryDiscoverRecipe(enemy) {
  const tier='tier'+clamp(enemy.tier,0,3);
  const dropFrom=enemy.isBoss?'boss':tier;
  const eligible=ALL_RECIPES.filter(r=>!r.known && !G.discoveredRecipes.includes(r.id) && r.dropFrom===dropFrom);
  eligible.forEach(r=>{
    if(rollPct(r.dropChance)){
      G.discoveredRecipes.push(r.id);
      G.totalRecipesFound++;
      showToast('📖 Recipe discovered: '+r.name+'!','recipe');
      checkAchievements();
    }
  });
}

function checkForgeDrop() {
  const dropWave=Math.floor(G.wave/FORGE_DROP_INTERVAL)*FORGE_DROP_INTERVAL;
  if(dropWave>0 && dropWave!==G.lastForgeDropWave) {
    G.lastForgeDropWave=dropWave;
    const nonLocked=UPGRADES.map((u,i)=>i).filter(i=>isUpgUnlocked(i));
    if(nonLocked.length){
      const pick=nonLocked[rand(0,nonLocked.length-1)];
      G.upgrades[pick]++;
      const banner=document.getElementById('forge-drop-notif');
      if(banner){
        banner.innerHTML='<div class="forge-drop-banner">🎁 Wave '+G.wave+' reward: '+UPGRADES[pick].name+' leveled up free!</div>';
        setTimeout(()=>{if(banner)banner.innerHTML='';},9000);
      }
      showToast('⚒️ Forge drop: '+UPGRADES[pick].name+' +1!','drop');
    }
  }
}

function combatTick() {
  // Combat fully locked until Prestige 1
  if(G.prestigeCount < 1) return;

  // Handle cooldown after death
  if(G.heroCooldown) {
    const now=Date.now();
    if(now >= G.heroCooldownEndsAt) {
      G.heroCooldown=false; G.heroCooldownEndsAt=null;
      G.hero.hp=G.hero.maxhp;
      G.wave=1; spawnEnemy();
      addLog('💚 Fully recovered! Ready to fight again.','le');
      showToast('⚔️ Hero recovered! Wave reset to 1.','info');
    }
    if(document.getElementById('panel-combat').classList.contains('on')) renderCombat();
    return;
  }

  if(!G.enemy) spawnEnemy();
  const now=Date.now();
  const hs=heroStats();
  const shielded=(G.activeEffects.shield&&now<G.activeEffects.shield.exp)||(G.activeEffects.invuln&&now<G.activeEffects.invuln.exp);
  // Regen
  if(G.heroPassive.regen && G.hero.hp<G.hero.maxhp)
    G.hero.hp=Math.min(G.hero.maxhp, G.hero.hp+G.heroPassive.regen);
  // Hero attacks
  const isCrit=rollPct(hs.crit);
  const dmgE=Math.max(1, Math.floor((hs.atk - G.enemy.def)*(isCrit?hs.critMult:1)));
  G.enemyHP=Math.max(0, G.enemyHP-dmgE);
  addLog((isCrit?'⚡ CRIT! ':'')+'Hit '+G.enemy.name+' for '+dmgE, isCrit?'lb':'lg');
  // Enemy retaliates
  if(G.enemyHP>0){
    if(shielded){ addLog('🛡️ Shield blocked!','le'); }
    else {
      const dmgH=Math.max(1, Math.floor(G.enemy.atk - hs.def));
      G.hero.hp=Math.max(0, G.hero.hp-dmgH);
      addLog(G.enemy.name+' hits for '+dmgH,'lr');
    }
  }
  // Enemy dead
  if(G.enemyHP<=0){
    G.totalKills++; G.questProg.kills++;
    if(G.heroPassive.vampiric) G.hero.hp=Math.min(G.hero.maxhp, G.hero.hp+G.heroPassive.vampiric);
    const drops=rollCombatDrops(G.enemy);
    drops.forEach(d=>{
      if(d.type==='coin')     addLog('+'+fmt(d.amt)+' coins','lg');
      if(d.type==='shard')    addLog('💀 +'+d.amt+' Soul Shards','lr');
      if(d.type==='gem')      addLog('💎 +'+d.amt+' gem!','lb');
      if(d.type==='relic')    addLog('📦 '+d.relic.name+' dropped!','lp');
      if(d.type==='milestone')addLog('⭐ Wave bonus: +'+fmt(d.amt),'la');
    });
    if(G.enemy.isBoss){
      G.bossKills++; G.gems+=2; G.totalGems+=2;
      addLog('🏆 BOSS SLAIN! +2 Gems','le');
      showToast('🐲 Boss defeated! +2 Gems!','gem');
    }
    tryDiscoverRecipe(G.enemy);
    gainXP(12 + G.wave*2);
    G.wave++; G.questProg.wave=G.wave;
    checkForgeDrop();
    spawnEnemy(); updateQuests(); checkAchievements(); renderAll();
    if(document.getElementById('panel-combat').classList.contains('on')) renderCombat();
    return;
  }
  // Hero dead
  if(G.hero.hp<=0){
    const setback = rand(2,5);
    const newWave = Math.max(1, G.wave - setback);
    addLog('💀 Defeated! Wave -'+setback+'...','lr');
    const recoverySecs = Math.floor(30 + G.hero.maxhp * 0.5);
    G.heroCooldown=true; G.heroCooldownEndsAt=Date.now()+recoverySecs*1000;
    G.hero.hp=0; G.wave=newWave;
    showToast('💀 Defeated! -'+setback+' waves. Recovery: '+fmtTime(recoverySecs),'bad');
    if(document.getElementById('panel-combat').classList.contains('on')) renderCombat();
    renderAll(); return;
  }
  if(document.getElementById('panel-combat').classList.contains('on')) renderCombat();
  renderAll(); updateQuests();
}

function buyHeroGear(i){
  const u=HERO_GEAR[i];
  if(G.soulShards<u.shardCost || G.heroGear[i]) return;
  G.soulShards-=u.shardCost;
  G.heroGear[i]=true;
  if(u.stat==='maxhp'){G.hero.maxhp+=u.amt; G.hero.hp=Math.min(G.hero.hp+u.amt,G.hero.maxhp);}
  else if(u.stat==='crit') G.hero.crit=clamp(G.hero.crit+u.amt,0,75);
  else G.hero[u.stat]+=u.amt;
  showToast('⚔️ '+u.name+' equipped!');
  renderAll(); renderCombat();
}

function buyHeroSkill(id){
  const sk=HERO_SKILLS.find(s=>s.skill===id);
  if(!sk || G.heroSkills[id] || G.soulShards<sk.shardCost) return;
  G.soulShards-=sk.shardCost; G.heroSkills[id]=true;
  G.heroPassive[id]=(G.heroPassive[id]||0)+sk.val;
  showToast('🌟 '+sk.name+' learned!');
  renderAll(); renderCombat();
}

/* ═══════════════════════════════════════
   EXPEDITIONS
   ═══════════════════════════════════════ */
function rollExpeditionRewards(expDef) {
  const out=[];
  expDef.rewardPool.forEach(r=>{
    if(r.type==='coins') out.push({type:'coins', amt:rand(r.min,r.max)});
    if(r.type==='xp')    out.push({type:'xp',    amt:rand(r.min,r.max)});
    if(r.type==='gems')  out.push({type:'gems',   amt:rand(r.min,r.max)});
    if(r.type==='relic' && rollPct(r.chance)) {
      const id=r.ids[rand(0,r.ids.length-1)];
      out.push({type:'relic', id, ico:RELIC_DEFS.find(d=>d.id===id).ico});
    }
  });
  if(rollPct(expDef.gemChance)) {
    const bonus=rand(1,3);
    out.push({type:'gems', amt:bonus, bonus:true});
  }
  return out;
}

function startExp(i){
  const e=G.expeditions[i];
  if(e.active || G.wave<e.minWave || G.coins<e.coinCost) return;
  G.coins-=e.coinCost;
  e.active=true; e.endsAt=Date.now()+e.dur*1000; e.done=false; e.pendingRewards=null;
  showToast('🗺️ '+e.name+' begun!','info');
  if(document.getElementById('panel-expeditions').classList.contains('on')) renderExpeditions();
}

function claimExp(i){
  const e=G.expeditions[i];
  if(!e.done) return;
  const rewards=e.pendingRewards||[];
  rewards.forEach(r=>{
    if(r.type==='coins'){G.coins+=r.amt; G.totalCoins+=r.amt; G.questProg.earn+=r.amt;}
    else if(r.type==='xp')    gainXP(r.amt);
    else if(r.type==='gems'){G.gems+=r.amt; G.totalGems+=r.amt; showToast('💎 +'+r.amt+' Gems!','gem');}
    else if(r.type==='relic') G.relicInventory[r.id]=(G.relicInventory[r.id]||0)+1;
  });
  G.totalExp++; G.questProg.expdone++;
  e.active=false; e.done=false; e.endsAt=null; e.pendingRewards=null;
  showToast('✅ '+e.name+' complete!','gem');
  updateQuests(); checkAchievements(); renderAll();
  if(document.getElementById('panel-expeditions').classList.contains('on')) renderExpeditions();
}

/* ═══════════════════════════════════════
   ALCHEMY
   ═══════════════════════════════════════ */
function addToSlot(id){
  const idx=G.slots.indexOf(null);
  if(idx===-1){showToast('Cauldron full!','bad');return;}
  if(!(G.relicInventory[id]>=1)){showToast('Not enough '+id+'!','bad');return;}
  G.relicInventory[id]--; G.slots[idx]=id; renderAlchemy();
}
function clearSlot(i){
  if(G.slots[i]){
    G.relicInventory[G.slots[i]]=(G.relicInventory[G.slots[i]]||0)+1;
    G.slots[i]=null; renderAlchemy();
  }
}
function brew(){
  const filled=G.slots.filter(Boolean);
  if(filled.length<2){showToast('Need 2+ relics!','bad');return;}
  const sf=[...filled].sort().join();

  // Check if combo matches ANY recipe (known or unknown)
  const anyMatch=ALL_RECIPES.find(r=>r.ing.length===filled.length && [...r.ing].sort().join()===sf);

  if(anyMatch){
    // Discover if unknown
    if(!G.discoveredRecipes.includes(anyMatch.id)){
      G.discoveredRecipes.push(anyMatch.id);
      G.totalRecipesFound++;
      showToast('📖 Recipe discovered: '+anyMatch.name+'!','recipe');
      checkAchievements();
    }
    // Brew it
    G.slots=[null,null,null]; G.potions.push({...anyMatch});
    G.totalBrewed++; G.questProg.brewed++;
    showToast('⚗️ Brewed: '+anyMatch.name+'!','info');
    updateQuests(); checkAchievements(); renderAll(); renderAlchemy();
  } else {
    // Wrong combo — 15% chance each relic breaks permanently
    let broken=0;
    const returned=[];
    G.slots.forEach(id=>{
      if(!id) return;
      if(rollPct(15)){
        broken++;
        showToast('💥 '+RELIC_DEFS.find(d=>d.id===id)?.name+' crumbled!','bad');
      } else {
        returned.push(id);
      }
    });
    returned.forEach(id=>G.relicInventory[id]=(G.relicInventory[id]||0)+1);
    G.slots=[null,null,null];
    if(broken>0){
      showToast('❌ Unknown combo! '+broken+' relic(s) destroyed.','bad');
    } else {
      showToast('❌ No recipe matches this combination.','bad');
    }
    renderAlchemy();
  }
}
function usePotion(i){
  const p=G.potions[i]; if(!p) return;
  G.potions.splice(i,1);
  G.activeEffects[p.effect]={exp:Date.now()+p.dur*1000,val:p.val};
  showToast('🧪 '+p.name+' active!','info');
  renderAlchemy(); renderAll();
}

function buyRelicFromShop(id){
  const r=RELIC_DEFS.find(x=>x.id===id);
  if(G.gems<r.gemCost){showToast('Need '+r.gemCost+' gems!','bad');return;}

  showToast('Bought '+r.name+'! Check Alchemy.','gem');

function purchaseGemPack(i){

function purchaseAdFree(){

/* ═══════════════════════════════════════
   DAILY QUESTS
   ═══════════════════════════════════════ */
function generateQuests(){
  const pool=[...QUEST_POOL].sort(()=>Math.random()-.5).slice(0,3);
  G.quests=pool.map(q=>{
    const target=q.targets[rand(0,q.targets.length-1)];
    return{...q,target,current:0,claimed:false,
      desc:q.desc.replace('{n}',target),
      rwdType:q.rwd.split(':')[0],rwdAmt:parseInt(q.rwd.split(':')[1])};
  });
  G.questProg={clicks:0,earn:0,kills:0,expdone:0,brewed:0,wave:G.wave};
  G.questsRefreshAt=Date.now()+24*3600*1000;
  G.allQuestsBonusClaimed=false;
}
function updateQuests(){
  if(!G.quests.length || Date.now()>G.questsRefreshAt) generateQuests();
  G.quests.forEach(q=>{
    if(!q.claimed) q.current=Math.min(q.target, q.type==='wave'?G.wave:(G.questProg[q.type]||0));
  });
  if(document.getElementById('panel-daily').classList.contains('on')) renderDaily();
}
function claimQuest(i){
  const q=G.quests[i]; if(q.claimed||q.current<q.target) return;
  q.claimed=true;
  if(q.rwdType==='coins'){G.coins+=q.rwdAmt;G.totalCoins+=q.rwdAmt;}
  else if(q.rwdType==='xp') gainXP(q.rwdAmt);
  else if(q.rwdType==='gems'){G.gems+=q.rwdAmt;G.totalGems+=q.rwdAmt;}
  showToast('🎲 Quest done! +'+q.rwdAmt+' '+q.rwdType,'gem');
  checkAchievements(); renderAll(); renderDaily();
}
function claimAllBonus(){
  if(G.allQuestsBonusClaimed||!G.quests.every(q=>q.claimed)) return;
  G.allQuestsBonusClaimed=true; G.allQuestsDone++;
  G.gems+=ALL_QUESTS_GEM_BONUS; G.totalGems+=ALL_QUESTS_GEM_BONUS;
  showToast('💎 +'+ALL_QUESTS_GEM_BONUS+' Bonus Gems!','gem');
  checkAchievements(); renderAll(); renderDaily();
}

/* ═══════════════════════════════════════
   PRESTIGE
   ═══════════════════════════════════════ */
function checkPrestigeReady(){
  const req=prestigeReqLevel(G.prestigeCount);
  const btn=document.getElementById('pr-btn');
  const reqEl=document.getElementById('pr-req');
  if(!btn) return;
  const ready=G.level>=req;
  btn.disabled=!ready;
  reqEl.textContent = ready ? 'Ready! Forge upgrades reset. Everything else persists.' : 'Reach Level '+req+' (currently '+G.level+')';
  // Unlocks info
  const ul=document.getElementById('pr-unlocks');
  if(ul){
    const next=G.prestigeCount+1;
    const lines=[
      '✅ Forge upgrades reset, all progress kept',
      next===1?'🔓 Prestige 1 → Unlocks Combat tab':'',
      next===2?'🔓 Prestige 2 → Unlocks Expeditions tab':'',
      next===3?'🔓 Prestige 3 → Unlocks Alchemy tab':'',
    ].filter(Boolean);
    ul.innerHTML=lines.join('<br>');
  }
  // Bonus text
  const btxt=document.getElementById('pr-bonus-text');
  if(btxt) btxt.textContent=
    'Prestiges: '+G.prestigeCount+
    ' · XP bonus: +'+(G.prestigeCount*15)+'%'+
    ' · Income mult: ×'+(1+G.prestigeCount*0.25).toFixed(2)+
    ' · Click bonus: +'+(G.prestigeCount*5)+' flat coins'+
    ' · Next Ascend at Level '+prestigeReqLevel(G.prestigeCount);
}

function doPrestige(){
  const req=prestigeReqLevel(G.prestigeCount);
  if(G.level<req) return;
  const prevCount = G.prestigeCount;
  G.prestigeCount++;
  // Prestige mult affects coin income
  G.prestigeMult=1+G.prestigeCount*0.25;
  // Reset only upgrades
  G.upgrades=Array(UPGRADES.length).fill(0);
  G.coins=0; G.totalCoins=0; G.clicks=0; G.level=1; G.xp=0;
  showToast('✨ Ascended to Prestige '+G.prestigeCount+'! +'+G.prestigeCount*25+'% coins, +'+G.prestigeCount*15+'% XP!','prestige');
  updateTabLocks();
  checkPrestigeReady();
  renderAll();
  checkAchievements();
  // Trigger tutorial for newly unlocked tabs
  if(prevCount===0) setTimeout(()=>{ switchTabWithTutorial('combat'); },800);
  if(prevCount===1) setTimeout(()=>{ switchTabWithTutorial('expeditions'); },800);
  if(prevCount===2) setTimeout(()=>{ switchTabWithTutorial('alchemy'); },800);
}

/* ═══════════════════════════════════════
   TAB LOCKING
   ═══════════════════════════════════════ */
function updateTabLocks(){
  const locks={
    combat:      G.prestigeCount>=1,
    expeditions: G.prestigeCount>=2,
    alchemy:     G.prestigeCount>=3,
  };
  ['combat','expeditions','alchemy'].forEach(id=>{
    const tab=document.getElementById('tab-'+id);
    if(!tab) return;
    if(locks[id]){
      tab.style.display='';
      tab.classList.remove('locked-tab');
    } else {
      tab.style.display='none'; // Completely hidden until unlocked
    }
  });
}

function isTabLocked(id){
  const locks={combat:1, expeditions:2, alchemy:3};
  return locks[id]!==undefined && G.prestigeCount < locks[id];
}

const BASE_TABS=['upgrades','combat','expeditions','alchemy','shop','daily','prestige'];
function switchTab(name){
  if(isTabLocked(name)){
    showToast('🔒 Unlocks at Prestige '+(name==='combat'?1:name==='expeditions'?2:3)+'!','bad');
    return;
  }
  const allTabs=[...BASE_TABS,'dev','trophies'];
  allTabs.forEach(t=>{
    const tab=document.getElementById('tab-'+t);
    const panel=document.getElementById('panel-'+t);
    if(tab)   tab.classList.toggle('on',   t===name);
    if(panel) panel.classList.toggle('on', t===name);
  });
  if(name==='combat')      renderCombat();
  if(name==='expeditions') renderExpeditions();
  if(name==='alchemy')     renderAlchemy();
  if(name==='shop')        renderShop();
  if(name==='daily')       {updateQuests(); renderDaily();}

/* ── FORGE ── */
function renderUpgrades(){
  const list=document.getElementById('upg-list');
  const nextForge=FORGE_DROP_INTERVAL-(((G.wave-1))%FORGE_DROP_INTERVAL);
  const qtyLabels=[['1','1'],['10','10'],['100','100'],['Max','max']];
  const qtyVals=[1,10,100,-1];
  let html='<div class="sec">Forge — free upgrade every '+FORGE_DROP_INTERVAL+' waves · next in '+nextForge+' waves</div>'
    +'<div class="buy-qty-row"><span class="buy-qty-lbl">BUY:</span>'
    +qtyLabels.map(([lbl],qi)=>`<div class="qty-btn${G.forgeBuyQty===qtyVals[qi]?' active':''}" data-qty="${qtyVals[qi]}">${lbl}×</div>`).join('')
    +'</div>';
  UPGRADES.forEach((u,i)=>{
    const lv=G.upgrades[i];
    const unlocked=isUpgUnlocked(u.unlockReq?u.unlockReq:null,i);
    const cost=upgCost(i);
    const can=unlocked && G.coins>=cost;
    if(!unlocked){
      const req=u.unlockReq;
      html+=`<div class="upg locked-upg">
        <div class="upg-ico">${u.ico}</div>
        <div class="upg-body">
          <div class="upg-name">${u.name}</div>
          <div class="upg-desc">${u.desc}</div>
          <div class="upg-unlock">🔒 Requires "${UPGRADES[req.idx].name}" level ${req.lv}</div>
        </div>
        <div class="upg-cost"><div class="upg-cv" style="color:var(--muted)">Locked</div></div>
      </div>`;
    } else {
      const showQty = G.forgeBuyQty===-1 ? maxAffordable(i) : G.forgeBuyQty;
      const totalCost = showQty > 0 ? upgCostN(i, showQty) : upgCost(i);
      const canBuy = unlocked && G.coins >= upgCost(i);
      const canAffordAll = unlocked && G.coins >= totalCost;
      html+=`<div class="upg${canBuy?' can':''}" data-upg="${i}">
        <div class="upg-ico">${u.ico}</div>
        <div class="upg-body">
          <div class="upg-name">${u.name}</div>
          <div class="upg-desc">${u.desc}</div>
          ${lv>0 && lv%10!==0 ? `<div style="font-size:9px;color:var(--amber)">🌟 Next milestone: Lv ${Math.ceil(lv/10)*10} (×${(Math.pow(1.5,Math.floor(lv/10)+1)).toFixed(2)} bonus)</div>` : ''}
          ${lv>0 && lv%10===0 ? `<div style="font-size:9px;color:var(--gold)">✨ Milestone active! ×${Math.pow(1.5,Math.floor(lv/10)).toFixed(2)} bonus</div>` : ''}
        </div>
        <div class="upg-cost">
          <div class="upg-cv" style="${canAffordAll?'':'color:var(--muted)'}">${fmt(totalCost)}</div>
          <div class="upg-cl">${showQty>1?'×'+showQty+' ':''}coins</div>
        </div>
        <div class="upg-lv">Lv ${lv}</div>
      </div>`;
    }
  });
  list.innerHTML=html;
  list.querySelectorAll('[data-qty]').forEach(el=>el.addEventListener('click',()=>{
    G.forgeBuyQty=parseInt(el.dataset.qty)||el.dataset.qty;
    if(el.dataset.qty==='max'||el.dataset.qty==='-1') G.forgeBuyQty=-1;
    renderUpgrades();
  }));
  list.querySelectorAll('[data-upg]').forEach(el=>el.addEventListener('click',()=>buyUpg(parseInt(el.dataset.upg))));
}
// Helper to check unlock by passing (req, idx)
function isUpgUnlocked(req, idx){
  if(idx!==undefined) { // called from renderUpgrades
    const r=UPGRADES[idx].unlockReq;
    if(!r) return true;
    return G.upgrades[r.idx]>=r.lv;
  }
  if(!req) return true;
  return G.upgrades[req.idx]>=req.lv;
}

      ? e.pendingRewards.map(r=>{

          if(r.type==='xp')   return`<span class="exp-tag reward">⭐ ${r.amt} XP</span>`;
          if(r.type==='gems') return`<span class="exp-tag gem">💎 ${r.amt}</span>`;
          if(r.type==='relic')return`<span class="exp-tag reward">${r.ico} relic</span>`;

            <span class="exp-tag">⏳ ${fmtTime(e.dur)}</span>

          </div>

      <div class="pot-ico">${isKnown?r.ico:'&#127787;'}</div>
      <div class="pot-body">
        <div class="pot-name">${isKnown?r.name:'??? Unknown Potion'}</div>
        <div class="pot-desc">${isKnown?r.desc:'Experiment to discover this recipe'}</div>
        ${isKnown?`<div class="pot-ing">${r.ing.map(id=>RELIC_DEFS.find(d=>d.id===id)?.ico||id).join(' + ')}</div>`:''}
      </div>
      ${isKnown
        ?'<div class="pot-action">BREW</div>'
        :`<div ${unlockAttr} style="cursor:pointer;background:rgba(75,157,232,.08);border:1px solid rgba(75,157,232,.22);border-radius:6px;padding:3px 7px;font-size:9px;color:var(--sapphire);font-family:var(--font-h)">💎 10</div>`
      }
    </div>`;
  });

    html+='<div class="sec" style="margin-top:11px">Your Potions ('+G.potions.length+')</div>'
      +'<div class="potions-owned">'
      +G.potions.map((p,i)=>`<div class="potion-item" data-pot="${i}">
        <div class="pot-ico">${p.ico}</div>
        <div class="pot-body"><div class="pot-name">${p.name}</div><div class="pot-desc">${p.desc} (${fmtTime(p.dur)})</div></div>

      G.gems-=10; G.discoveredRecipes.push(id); G.totalRecipesFound++;
      const r=ALL_RECIPES.find(x=>x.id===id);
      showToast('📖 Recipe unlocked: '+r.name+'!','recipe');
      checkAchievements(); renderAll(); renderAlchemy();
    }
  }));
  panel.querySelectorAll('[data-recipe]').forEach(el=>{
    el.addEventListener('click',()=>{
      const id=el.dataset.recipe;
      const r=ALL_RECIPES.find(x=>x.id===id);
      if(!r || !G.discoveredRecipes.includes(id)) return;
      // Clear slots
      G.slots.forEach((_,i)=>{if(G.slots[i]){G.relicInventory[G.slots[i]]=(G.relicInventory[G.slots[i]]||0)+1;G.slots[i]=null;}});
      // Check stock
      const needed={}; r.ing.forEach(id2=>needed[id2]=(needed[id2]||0)+1);
      const ok=Object.entries(needed).every(([id2,cnt])=>(G.relicInventory[id2]||0)>=cnt);
      if(!ok){showToast('Missing relics!','bad');renderAlchemy();return;}
      r.ing.forEach(id2=>{const si=G.slots.indexOf(null);if(si!==-1){G.relicInventory[id2]--;G.slots[si]=id2;}});
      renderAlchemy();
    });
  });
}

/* ═══════════════════════════════════════
   COLLAPSE PANEL
   ═══════════════════════════════════════ */
let panelCollapsed = false;
let nudgeLastShown = 0;
let nudgeTimer = null;

function setPanelCollapsed(v) {
  panelCollapsed = v;
  const pane = document.getElementById('bottom-pane');
  const btn  = document.getElementById('collapse-btn');
  const lbl  = document.getElementById('collapse-lbl');
  const cz   = document.querySelector('.click-zone');
  const ico  = btn.querySelector('.cb-ico');

  btn.classList.toggle('collapsed', v);
  ico.textContent = v ? '▲' : '▼';
  lbl.textContent = v ? 'SHOW PANEL' : 'HIDE PANEL';
  cz.classList.toggle('expanded', v);

  if(v) {
    // Collapse: set to actual height first, then animate to 0
    pane.style.maxHeight = pane.scrollHeight + 'px';
    // Force reflow before setting to 0
    pane.getBoundingClientRect();
    pane.style.maxHeight = '0';
    pane.classList.add('collapsed');
    scheduleNudge();
  } else {
    // Expand: animate from 0 to actual height
    pane.classList.remove('collapsed');
    pane.style.maxHeight = pane.scrollHeight + 'px';
    setTimeout(()=>{ pane.style.maxHeight = ''; }, 400);
    clearNudge();
  }
}

document.getElementById('collapse-btn').addEventListener('click', ()=>{
  setPanelCollapsed(!panelCollapsed);
});
document.getElementById('upg-nudge').addEventListener('click', ()=>{
  if(panelCollapsed) setPanelCollapsed(false);
  clearNudge();
});

function scheduleNudge() {
  clearNudge();
  nudgeTimer = setInterval(()=>{
    if(!panelCollapsed) return clearNudge();
    const now = Date.now();
    if(now - nudgeLastShown < 20000) return;
    // Find best affordable upgrade
    let best = null;
    UPGRADES.forEach((u,i)=>{
      const req = u.unlockReq;
      if(req && G.upgrades[req.idx] < req.lv) return;
      if(G.coins >= upgCost(i)) best = u;
    });
    if(best) {
      nudgeLastShown = now;
      showNudge('⚒️ '+best.name+' upgrade ready!');
    }
  }, 3000);
}

function clearNudge() {
  if(nudgeTimer) { clearInterval(nudgeTimer); nudgeTimer = null; }
  document.getElementById('upg-nudge').classList.remove('show');
}

let nudgeHideT;
function showNudge(txt) {
  const el = document.getElementById('upg-nudge');
  document.getElementById('nudge-txt').textContent = txt;
  el.classList.add('show');
  clearTimeout(nudgeHideT);
  nudgeHideT = setTimeout(()=>el.classList.remove('show'), 4000);
}

let tutorialQueue = [];
let tutorialStep  = 0;

function showTutorial(key) {
  if(localStorage.getItem('tut_done_'+key)) return;
  const steps = TUTORIALS[key];
  if(!steps) return;
  tutorialQueue = steps;
  tutorialStep  = 0;
  renderTutStep();
}

function renderTutStep() {
  const ov = document.getElementById('tut-overlay');
  const steps = tutorialQueue;
  if(tutorialStep >= steps.length) {
    closeTutorial(true);
    return;
  }
  const s = steps[tutorialStep];
  const isLast = tutorialStep === steps.length-1;
  const dotsHtml = steps.map((_,i)=>`<div class="tut-dot${i===tutorialStep?' active':''}"></div>`).join('');

  ov.style.display = 'flex';
  ov.innerHTML = `<div class="tut-box">
    <div class="tut-steps">${dotsHtml}</div>
    <span class="tut-ico">${s.ico}</span>
    <div class="tut-title">${s.title}</div>
    <p class="tut-body">${s.body}</p>
    <button class="tut-btn" id="tut-next">${isLast ? '✓ Got it!' : 'Next →'}</button>
    <span class="tut-skip" id="tut-skip">Skip tutorial</span>
  </div>`;

  document.getElementById('tut-next').addEventListener('click', ()=>{
    tutorialStep++;
    renderTutStep();
  });
  document.getElementById('tut-skip').addEventListener('click', ()=>closeTutorial(false));
}

function closeTutorial(markDone) {
  const ov = document.getElementById('tut-overlay');
  ov.style.display = 'none';
  if(markDone || true) { // always mark as done to not repeat
    // We need to know which key — track it
    if(tutorialQueue === TUTORIALS.intro)       localStorage.setItem('tut_done_intro','1');
    else if(tutorialQueue === TUTORIALS.combat) localStorage.setItem('tut_done_combat','1');
    else if(tutorialQueue === TUTORIALS.expeditions) localStorage.setItem('tut_done_expeditions','1');
    else if(tutorialQueue === TUTORIALS.alchemy)     localStorage.setItem('tut_done_alchemy','1');
  }
}
